<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Running - Local Storage</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h2>🏃 Running Tracker</h2>
      <input type="number" id="distance" placeholder="Distance" />
      <input type="number" id="duration" placeholder="Duration (minutes)" />
      <select id="terrain">
        <option value="Road">Road</option>
        <option value="Train">Train</option>
      </select>

      <button onclick="addRun()">Add Run</button>

      <div class="stats">
        <h4>Stats</h4>
        <p>Total distance: <span id="totalDistance">0</span> km</p>
        <p>Total Duration: <span id="totalDuration">0</span> min</p>
        <p>Average Pace: <span id="averagePace">0</span> min/km</p>
        <p>Longest Run: <span id="longestRun">0</span> km</p>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
