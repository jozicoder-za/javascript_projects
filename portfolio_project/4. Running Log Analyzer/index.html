<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Running Log Analyzer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h2>Running Tracker</h2>
      <input type="number" id="distance" placeholder="Distance (km)" />
      <input type="number" id="duration" placeholder="Duration (minutes)" />
      <select id="terrain">
        <option value="Road">Road</option>
        <option value="Trail">Trail</option>
      </select>
      <button onclick="addRun()">Add Run</button>
      <div class="stats">
        <h4>Stats</h4>
        <p>Total Distance: <span id="totalDistance">0</span> km</p>
        <p>Total Duration: <span id="totalDuration">0</span> min</p>
        <p>Average Pace: <span id="averagePace">0</span> min/km</p>
        <p>Longest Run: <span id="longestRun">0</span> km</p>
        <h4>Terrain Breakdown</h4>
        <p id="terrainBreakdown"></p>
      </div>

      <div class="run-list">
        <h4>Runs</h4>
        <div id="runList"></div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
