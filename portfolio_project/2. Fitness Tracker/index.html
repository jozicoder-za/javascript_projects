<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fitness Tracker App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h2>Fitness Tracker</h2>
      <select id="type">
        <option value="Running">Running</option>
        <option value="Cycling">Cycling</option>
        <option value="Gym">Gym</option>
      </select>

      <input type="number" id="duration" placeholder="Duration (minutes)" />
      <input type="number" id="calories" placeholder="Calories burned" />
      <button onclick="addWorkout()">Add Workout</button>
      <div class="stats">
        <h4>Stats</h4>
        <p>Total Duration: <span id="totalDuration">0</span> min</p>
        <p>Total Calories: <span id="totalCalories">0</span></p>
        <p>Longest Workout: <span id="longestWorkout">None</span></p>
      </div>

      <div class="workout-list">
        <h4>Workouts</h4>
        <div id="workoutList"></div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
